<!doctype html>
<html lang="en">
	<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>I/O List Code Generator</title>

	<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

	<link rel="stylesheet" href="css/styles.css" />
	</head>

	<body>
	<div id="app">

		<!-- ── UPLOAD SCREEN ── -->
		<div v-if="screen === 'upload'" class="upload-screen">

			<img src="images/svg/moon-v1.svg" class="style-mode" alt="Light controller" />

			<div class="ocean-bg">
				<!--
				  El barco es un SVG SEPARADO con tamaño fijo en píxeles,
				  posicionado con CSS en bottom:60% (= superficie de la ola #0284c7).
				  Las olas se estiran con preserveAspectRatio="none" para llenar
				  el ancho, pero el barco nunca se deforma.
				-->

				<!-- Barco (z-index inferior, detrás de las olas) -->
				<svg class="yacht-icon"
					viewBox="0 0 200 250"
					preserveAspectRatio="xMidYMid meet"
					xmlns="http://www.w3.org/2000/svg">
					<path d="M 92 30 Q 30 110 15 190 Q 55 185 92 190 Z" fill="#7dd3fc"/>
					<path d="M 102 25 L 102 190 Q 150 185 190 190 Q 150 110 102 25 Z" fill="#f8fafc"/>
					<rect x="94" y="15" width="6" height="180" fill="#94a3b8" rx="3"/>
					<path d="M 5 190 L 195 190 L 170 225 L 30 225 Z" fill="#cbd5e1"/>
					<path d="M 8 195 L 192 195 L 186 202 L 14 202 Z" fill="#0f172a"/>
					<path d="M 30 225 L 170 225 L 160 240 L 40 240 Z" fill="#334155"/>
				</svg>

				<!-- Olas (z-index superior, cubren el casco → efecto flotación) -->
				<svg class="ocean-waves"
					viewBox="0 0 1440 320"
					preserveAspectRatio="none"
					xmlns="http://www.w3.org/2000/svg">
					<path fill="#0284c7" fill-opacity="0.5" d="M0,160L48,144C96,128,192,96,288,106.7C384,117,480,171,576,165.3C672,160,768,96,864,96C960,96,1056,160,1152,176C1248,192,1344,160,1392,144L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"/>
					<path fill="#0369a1" fill-opacity="1" d="M0,224L48,213.3C96,203,192,181,288,186.7C384,192,480,224,576,240C672,256,768,256,864,240C960,224,1056,192,1152,181.3C1248,171,1344,181,1392,186.7L1440,192L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"/>
				</svg>
			</div>

			<div class="upload-card">
				<h1>I/O List Code Generator</h1>
				<p class="upload-subtitle">Selecciona un archivo Excel con la lista de I/Os para comenzar.</p>

				<label class="upload-btn">
					Seleccionar archivo
					<input type="file" @change="onFile" accept=".xlsx,.xls,.xlsm" style="display:none" />
				</label>

				<p class="upload-hint">.xlsx · .xls · .xlsm</p>

				<div v-if="fileError" class="upload-error">{{ fileError }}</div>
			</div>
		</div>

		<!-- ── MAIN APP ── -->
		<template v-if="screen === 'app'">
		<div class="app-shell">

			<!-- Sidebar nav -->
			<nav class="side-nav">
				<div class="nav-logo">
					<span class="nav-logo-text">I/O Generator</span>
					<label class="nav-file-btn" title="Cargar otro archivo">
						📁
						<input type="file" @change="onFile" accept=".xlsx,.xls,.xlsm" style="display:none" />
					</label>
				</div>

				<div class="nav-section-label">GVL</div>
				<button class="nav-item" :class="{ active: activeSection === 'io_tags' }" @click="activeSection = 'io_tags'">
					<span class="nav-icon">&#9632;</span> IO_Tags
				</button>
				<button class="nav-item" :class="{ active: activeSection === 'gvl' }" @click="activeSection = 'gvl'">
					<span class="nav-icon">&#9632;</span> GVL
				</button>
				<button class="nav-item" :class="{ active: activeSection === 'alarm_tags' }" @click="activeSection = 'alarm_tags'">
					<span class="nav-icon">&#9632;</span> Alarm_tags
				</button>

				<div class="nav-section-label">Alarms PRG</div>
				<button class="nav-item" :class="{ active: activeSection === 'alarms_decl' }" @click="activeSection = 'alarms_decl'">
					<span class="nav-icon">&#9650;</span> Declarations
				</button>
				<button class="nav-item" :class="{ active: activeSection === 'alarms_prog' }" @click="activeSection = 'alarms_prog'">
					<span class="nav-icon">&#9650;</span> Program
				</button>

				<div class="nav-section-label">Scaling</div>
				<button class="nav-item" :class="{ active: activeSection === 'var_scale' }" @click="activeSection = 'var_scale'">
					<span class="nav-icon">&#9670;</span> VariableScale
				</button>
				<button class="nav-item" :class="{ active: activeSection === 'var_map' }" @click="activeSection = 'var_map'">
					<span class="nav-icon">&#9670;</span> VariableMapping
				</button>

				<div class="nav-section-label">Files</div>
				<button class="nav-item" :class="{ active: activeSection === 'tmc' }" @click="activeSection = 'tmc'">
					<span class="nav-icon">&#128196;</span> Alarms.tmc
				</button>

				<div class="nav-section-label">System</div>
				<button class="nav-item" :class="{ active: activeSection === 'debug' }" @click="activeSection = 'debug'">
					<span class="nav-icon">&#9881;</span> Debug
				</button>

				<div class="nav-pills">
					<span class="pill">{{ usedSheetName || '-' }}</span>
					<span class="pill">I/Os: {{ controlCount || '-' }}</span>
					<span class="pill">DI alarms: {{ alarmDigitalLinesCount || '-' }}</span>
					<span class="pill">AI alarms: {{ alarmAnalogLinesCount || '-' }}</span>
				</div>
			</nav>

			<!-- Content area -->
			<main class="content-area">

				<!-- IO_tags -->
				<div v-if="activeSection === 'io_tags'" class="code-window">
					<div class="window-bar">
						<span class="window-title">IO_Tags <span class="window-sub">GVL – Hardware linked tags</span></span>
						<div class="window-actions">
							<button class="copyBtn" @click="copyText(tagsText, 'IO_Tags')">Copy</button>
							<button class="copyBtn" @click="downloadXmlIO()">Create IO_Tags.xml</button>
						</div>
					</div>
					<pre class="code-editor" v-html="highlightPLC(tagsText)"></pre>
				</div>

				<!-- GVL -->
				<div v-if="activeSection === 'gvl'" class="code-window">
					<div class="window-bar">
						<span class="window-title">GVL <span class="window-sub">GVL – Internal tags</span></span>
						<div class="window-actions">
							<button class="copyBtn" @click="copyText(GVLtags, 'GVL_Tags')">Copy</button>
							<button class="copyBtn" @click="downloadXmlGVL()">Create GVL.xml</button>
						</div>
					</div>
					<pre class="code-editor" v-html="highlightPLC(GVLtags)"></pre>
				</div>

				<!-- Alarm_tags -->
				<div v-if="activeSection === 'alarm_tags'" class="code-window">
					<div class="window-bar">
						<span class="window-title">Alarm_tags <span class="window-sub">GVL</span></span>
						<div class="window-actions">
							<button class="copyBtn" @click="copyText(alarmTagsText, 'Alarm_tags')">Copy</button>
							<button class="copyBtn" @click="downloadXmlAlarm()">Create Alarm_tags.xml</button>
						</div>
					</div>
					<pre class="code-editor" v-html="highlightPLC(alarmTagsText)"></pre>
				</div>

				<!-- Alarms Declarations -->
				<div v-if="activeSection === 'alarms_decl'" class="code-window">
					<div class="window-bar">
						<span class="window-title">Alarms <span class="window-sub">PRG – Declarations</span></span>
						<button class="copyBtn" @click="copyText(alarmsTwinCatDeclaration, 'Alarms Declarations')">Copy</button>
					</div>
					<pre class="code-editor" v-html="highlightPLC(alarmsTwinCatDeclaration)"></pre>
				</div>

				<!-- Alarms Program -->
				<div v-if="activeSection === 'alarms_prog'" class="code-window">
					<div class="window-bar">
						<span class="window-title">Alarms <span class="window-sub">PRG – Program</span></span>
						<button class="copyBtn" @click="copyText(alarmsTwinCatProgram, 'Alarms Program')">Copy</button>
					</div>
					<pre class="code-editor" v-html="highlightPLC(alarmsTwinCatProgram)"></pre>
				</div>

				<!-- VariableScale -->
				<div v-if="activeSection === 'var_scale'" class="code-window">
					<div class="window-bar">
						<span class="window-title">VariableScale <span class="window-sub">Program</span></span>
						<button class="copyBtn" @click="copyText(variableScalingProgram, 'VariableScale')">Copy</button>
					</div>
					<pre class="code-editor" v-html="highlightPLC(variableScalingProgram)"></pre>
				</div>

				<!-- VariableMapping -->
				<div v-if="activeSection === 'var_map'" class="code-window">
					<div class="window-bar">
						<span class="window-title">VariableMapping <span class="window-sub">Program</span></span>
						<button class="copyBtn" @click="copyText(variableMappingProgram, 'VariableMapping')">Copy</button>
					</div>
					<pre class="code-editor" v-html="highlightPLC(variableMappingProgram)"></pre>
				</div>

				<!-- Alarms.tmc -->
				<div v-if="activeSection === 'tmc'" class="code-window">
					<div class="window-bar">
						<span class="window-title">Alarms <span class="window-sub">.tmc file</span></span>
						<div class="window-actions">
							<button class="copyBtn" @click="copyText(tmcText, 'Alarms.tmc Copy')">Copy</button>
							<button class="copyBtn" @click="downloadTmc()">Create Alarms.tmc</button>
						</div>
					</div>
					<pre class="code-editor" v-html="highlightPLC(tmcText)"></pre>
				</div>

				<!-- Debug -->
				<div v-if="activeSection === 'debug'" class="code-window">
					<div class="window-bar">
						<span class="window-title">Debug</span>
					</div>
					<pre class="code-editor">{{ debug }}</pre>
				</div>

			</main>
		</div>
		</template>

	</div>

	<script src="config.js"></script>
	<script src="js/app.js"></script>
	</body>
</html>
