
<style>
#erd { padding: 1rem 0; }
#erd svg { max-width: 100%; height: auto; }
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  USUARIOS ||--o| EMPLEADOS : "vinculado a"
  USUARIOS ||--o{ LOGS : "genera"
  EMPLEADOS }o--o| UBICACIONES : "trabaja en"
  UBICACIONES ||--o{ IMAGENES : "tiene"
  EMPLEADOS }o--|| DEPARTAMENTOS : "pertenece a"
  LOGS }o--o| EMPLEADOS : "afecta a"
  LOGS }o--o| UBICACIONES : "ocurre en"
  SESIONES }o--|| EMPLEADOS : "registra"
  SESIONES }o--|| UBICACIONES : "en"

  USUARIOS {
    ObjectId _id PK
    String email UK
    String passwordHash
    String nombre
    String rol "admin supervisor operador"
    ObjectId empleadoRef FK
    Boolean activo
    Date createdAt
    Date updatedAt
  }

  EMPLEADOS {
    ObjectId _id PK
    String nombre
    String apellidos
    ObjectId departamentoId FK
    ObjectId ubicacionActualId FK
    String telefono
    String avatar
    Boolean activo
    Date createdAt
    Date updatedAt
  }

  DEPARTAMENTOS {
    ObjectId _id PK
    String nombre UK
    String color
    String icono
    Boolean activo
  }

  UBICACIONES {
    ObjectId _id PK
    String nombre
    String tipo "base oficina taller barco"
    Float latitud
    Float longitud
    Boolean esMovil
    String descripcion
    Boolean activo
    Date createdAt
    Date updatedAt
  }

  IMAGENES {
    ObjectId _id PK
    ObjectId ubicacionId FK
    String url
    String descripcion
    Date subidaPor
    Date createdAt
  }

  LOGS {
    ObjectId _id PK
    ObjectId usuarioId FK
    String accion
    ObjectId empleadoAfectadoId FK
    ObjectId ubicacionId FK
    Mixed detalles
    String ip
    Date timestamp
  }

  SESIONES {
    ObjectId _id PK
    ObjectId empleadoId FK
    ObjectId ubicacionId FK
    Date horaEntrada
    Date horaSalida
    Int duracionMinutos
    String estado "activa finalizada"
  }
`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
